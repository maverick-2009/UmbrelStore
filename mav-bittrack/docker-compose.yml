version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: mav-bittrack_server_1
      APP_PORT: 8585

  server:
    image: ghcr.io/maverick-2009/bittrack:1.1.0@sha256:fc33d5b8cbf2052ce8805c41321202e3b7dfccb2fb34f8ebb014ff0bbbe87315
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      DATA_DIR: "/app/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
